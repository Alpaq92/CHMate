<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHMate — pure-JavaScript CHM reader</title>
  <meta name="description" content="CHMate is a pure-JavaScript reader for Microsoft Compiled HTML Help (.chm) files. No plugins, no native modules, no WASM." />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="no-file">
    <!-- Top toolbar -->
    <header class="toolbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="2 2 20 20"><path fill="#087f5b" d="M12 2l.642 .005l.616 .017l.299 .013l.579 .034l.553 .046c4.687 .455 6.65 2.333 7.166 6.906l.03 .29l.046 .553l.041 .727l.006 .15l.017 .617l.005 .642l-.005 .642l-.017 .616l-.013 .299l-.034 .579l-.046 .553c-.455 4.687 -2.333 6.65 -6.906 7.166l-.29 .03l-.553 .046l-.727 .041l-.15 .006l-.617 .017l-.642 .005l-.642 -.005l-.616 -.017l-.299 -.013l-.579 -.034l-.553 -.046c-4.687 -.455 -6.65 -2.333 -7.166 -6.906l-.03 -.29l-.046 -.553l-.041 -.727l-.006 -.15l-.017 -.617l-.004 -.318v-.648l.004 -.318l.017 -.616l.013 -.299l.034 -.579l.046 -.553c.455 -4.687 2.333 -6.65 6.906 -7.166l.29 -.03l.553 -.046l.727 -.041l.15 -.006l.617 -.017c.21 -.003 .424 -.005 .642 -.005z" /><path fill="#e6fcf5" d="M12 15a1 1 0 0 0 -.993 .883l-.007 .117l.007 .127a1 1 0 0 0 1.986 0l.007 -.117l-.007 -.127a1 1 0 0 0 -.993 -.883zm1.368 -6.673a2.98 2.98 0 0 0 -3.631 .728a1 1 0 0 0 1.44 1.383l.171 -.18a.98 .98 0 0 1 1.11 -.15a1 1 0 0 1 -.34 1.886l-.232 .012a1 1 0 0 0 .111 1.994a3 3 0 0 0 1.371 -5.673z" /></svg>
        </span>
        <span class="app-name">CHMate</span>
        <span class="file-name" id="fileName" title=""></span>
      </div>

      <div class="tools">
        <button class="btn" id="btnOpen" title="Open a .chm file (Ctrl+O)">
          <svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19l2.757 -7.351a1 1 0 0 1 .936 -.649h12.307a1 1 0 0 1 .986 1.164l-.996 5.211a2 2 0 0 1 -1.964 1.625h-14.026a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2h4l3 3h7a2 2 0 0 1 2 2v2"/></svg><span class="lbl">Open</span>
        </button>
        <span class="sep"></span>
        <button class="btn icon" id="btnBack" title="Back (Alt+Left)" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l14 0"/><path d="M5 12l6 6"/><path d="M5 12l6 -6"/></svg></button>
        <button class="btn icon" id="btnForward" title="Forward (Alt+Right)" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l14 0"/><path d="M13 18l6 -6"/><path d="M13 6l6 6"/></svg></button>
        <button class="btn icon" id="btnHome" title="Home / default topic" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg></button>
        <span class="sep"></span>
        <button class="btn icon" id="btnZoomOut" title="Zoom out (Ctrl+-)" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l14 0"/></svg></button>
        <button class="btn zoom" id="btnZoomReset" title="Reset zoom" disabled>100%</button>
        <button class="btn icon" id="btnZoomIn" title="Zoom in (Ctrl++)" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg></button>
        <span class="sep"></span>
        <div class="find" id="findBox">
          <span class="find-ico" aria-hidden="true"><svg class="gi" viewBox="0 0 24 24"><path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"/><path d="M21 21l-6 -6"/></svg></span>
          <input type="search" id="findInput" placeholder="Find in page" disabled autocomplete="off" />
          <span class="find-count" id="findCount"></span>
          <button class="btn icon tiny" id="findPrev" title="Previous match" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6l6 6"/></svg></button>
          <button class="btn icon tiny" id="findNext" title="Next match" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6l-6 6"/></svg></button>
        </div>
        <span class="sep"></span>
        <button class="btn icon" id="btnTheme" title="Document theme: System"><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1v-10"/><path d="M7 20h10"/><path d="M9 16v4"/><path d="M15 16v4"/></svg></button>
        <button class="btn icon" id="btnPrint" title="Print this topic" disabled><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 17h2a2 2 0 0 0 2 -2v-4a2 2 0 0 0 -2 -2h-14a2 2 0 0 0 -2 2v4a2 2 0 0 0 2 2h2"/><path d="M17 9v-4a2 2 0 0 0 -2 -2h-6a2 2 0 0 0 -2 2v4"/><path d="M7 15a2 2 0 0 1 2 -2h6a2 2 0 0 1 2 2v4a2 2 0 0 1 -2 2h-6a2 2 0 0 1 -2 -2l0 -4"/></svg></button>
        <button class="btn icon" id="btnFull" title="Toggle fullscreen"><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8v-2a2 2 0 0 1 2 -2h2"/><path d="M4 16v2a2 2 0 0 0 2 2h2"/><path d="M16 4h2a2 2 0 0 1 2 2v2"/><path d="M16 20h2a2 2 0 0 0 2 -2v-2"/></svg></button>
      </div>
    </header>

    <!-- Main body: sidebar + viewer -->
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <div class="tabs">
            <button class="tab active" data-tab="contents">Contents</button>
            <button class="tab" data-tab="index">Index</button>
            <button class="tab" data-tab="files">Files</button>
          </div>
          <button class="btn icon tiny" id="btnHideSidebar" title="Hide sidebar"><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6l6 6"/></svg></button>
        </div>

        <div class="panel" data-panel="contents">
          <div class="tree" id="toc"></div>
        </div>
        <div class="panel hidden" data-panel="index">
          <input type="search" class="filter" id="indexFilter" placeholder="Filter index&#8230;" />
          <div class="list" id="indexList"></div>
        </div>
        <div class="panel hidden" data-panel="files">
          <input type="search" class="filter" id="filesFilter" placeholder="Filter files&#8230;" />
          <div class="list" id="filesList"></div>
        </div>
        <div class="resizer" id="resizer" title="Drag to resize"></div>
      </aside>

      <nav class="sidebar-rail" id="sidebarRail" aria-label="Collapsed navigation">
        <button class="rail-btn" id="btnExpandSidebar" title="Expand sidebar"><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6l-6 6"/></svg></button>
        <div class="rail-sep"></div>
        <button class="rail-btn rail-tab active" data-tab="contents" title="Contents"><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6h11"/><path d="M12 12h8"/><path d="M15 18h5"/><path d="M5 6v.01"/><path d="M8 12v.01"/><path d="M11 18v.01"/></svg></button>
        <button class="rail-btn rail-tab" data-tab="index" title="Index"><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 15a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/><path d="M18.5 18.5l2.5 2.5"/><path d="M4 6h16"/><path d="M4 12h4"/><path d="M4 18h4"/></svg></button>
        <button class="rail-btn rail-tab" data-tab="files" title="Files"><svg class="gi" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3v4a1 1 0 0 0 1 1h4"/><path d="M18 17h-7a2 2 0 0 1 -2 -2v-10a2 2 0 0 1 2 -2h4l5 5v7a2 2 0 0 1 -2 2"/><path d="M16 17v2a2 2 0 0 1 -2 2h-7a2 2 0 0 1 -2 -2v-10a2 2 0 0 1 2 -2h2"/></svg></button>
      </nav>

      <main class="viewer">
        <section class="dropzone" id="dropzone">
          <div class="drop-inner">
            <div class="drop-logo">
            <svg viewBox="2 2 20 20" aria-hidden="true"><path fill="#087f5b" d="M12 2l.642 .005l.616 .017l.299 .013l.579 .034l.553 .046c4.687 .455 6.65 2.333 7.166 6.906l.03 .29l.046 .553l.041 .727l.006 .15l.017 .617l.005 .642l-.005 .642l-.017 .616l-.013 .299l-.034 .579l-.046 .553c-.455 4.687 -2.333 6.65 -6.906 7.166l-.29 .03l-.553 .046l-.727 .041l-.15 .006l-.617 .017l-.642 .005l-.642 -.005l-.616 -.017l-.299 -.013l-.579 -.034l-.553 -.046c-4.687 -.455 -6.65 -2.333 -7.166 -6.906l-.03 -.29l-.046 -.553l-.041 -.727l-.006 -.15l-.017 -.617l-.004 -.318v-.648l.004 -.318l.017 -.616l.013 -.299l.034 -.579l.046 -.553c.455 -4.687 2.333 -6.65 6.906 -7.166l.29 -.03l.553 -.046l.727 -.041l.15 -.006l.617 -.017c.21 -.003 .424 -.005 .642 -.005z" /><path fill="#e6fcf5" d="M12 15a1 1 0 0 0 -.993 .883l-.007 .117l.007 .127a1 1 0 0 0 1.986 0l.007 -.117l-.007 -.127a1 1 0 0 0 -.993 -.883zm1.368 -6.673a2.98 2.98 0 0 0 -3.631 .728a1 1 0 0 0 1.44 1.383l.171 -.18a.98 .98 0 0 1 1.11 -.15a1 1 0 0 1 -.34 1.886l-.232 .012a1 1 0 0 0 .111 1.994a3 3 0 0 0 1.371 -5.673z" /></svg>
          </div>
            <h1>CHMate</h1>
            <p class="tagline">A pure-JavaScript reader for <code>.chm</code> Help files.<br />No plugins, no native modules, no WASM.</p>
            <button class="btn primary" id="btnOpen2">Open a .chm file</button>
            <p class="hint">&#8230; or drag &amp; drop one here</p>
            <p class="sample" id="sampleRow">Try the demo: <a href="#" id="btnSample">PuTTY User Manual</a></p>
            <p class="err" id="dropErr"></p>
          </div>
        </section>

        <iframe id="frame" class="topic-frame hidden" title="Help topic"
                sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-modals"></iframe>

        <div class="spinner hidden" id="spinner"><div class="dot"></div><span>Decompressing&#8230;</span></div>
      </main>
    </div>

    <footer class="statusbar">
      <span id="statusLeft">Ready</span>
      <span id="statusRight"></span>
    </footer>
  </div>

  <input type="file" id="filePicker" accept=".chm" hidden />
  <script type="module" src="src/app.js"></script>
</body>
</html>
